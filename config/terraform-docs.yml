formatter: markdown table

sections:
  show:
    - requirements
    - providers
    - modules
    - inputs
    - outputs

output:
  file: README.md
  mode: inject
  output-values:
    enabled: false
    from: ""

sort:
  enabled: true
  by: required

settings:
  anchor: true
  color: true
  default: true
  description: true
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: true
  read-comments: true
  required: true
  sensitive: true
  type: true
